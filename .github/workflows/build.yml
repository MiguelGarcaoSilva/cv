name: Build CV PDF

on:
  push:
    branches: [main]
    paths:
      - 'cv.tex'
      - 'papers.bib'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile cv.tex (XeLaTeX + Biber)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          latexmk_use_xelatex: true

      - name: Commit updated PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-build cv.pdf [skip ci]"
          file_pattern: cv.pdf
